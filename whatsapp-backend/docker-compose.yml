services:
  solaire-whatsapp:
    build: .
    container_name: solaire-whatsapp
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/data
      - TZ=America/Sao_Paulo
    volumes:
      - solaire_whatsapp_data:/data

volumes:
  solaire_whatsapp_data:
